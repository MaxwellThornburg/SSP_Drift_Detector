system:
  name: aegis-log
  environment: production
  region: us-gov-west-1

identity:
  human_auth:
    method: oidc
    provider: okta-fed
    mfa_required: true
    cac_piv_integration: true
  service_auth:
    method: spiffe
    token_ttl: 3600
  account_review_cadence_days: 90
  iam_users:
    - name: deploy-bot
      created: 2022-04-01
      last_rotated: 2024-11-15
      type: long_lived_access_key
    - name: legacy-etl
      created: 2022-09-12
      last_rotated: 2023-01-08
      type: long_lived_access_key

network:
  ingress:
    - type: alb
      tls_version_min: "1.2"
      waf_attached: true
      public: false
    - type: nlb
      tls_version_min: "1.0"   # legacy partner integration
      waf_attached: false
      public: false
  egress:
    mode: allowlist
    allowed_endpoints:
      - "*.amazonaws.com"
      - "iron-bank.dso.mil"
      - "api.partner-system.mil"
      - "*.github.com"          # added 2025-03 for CI artifact pulls
  vpn:
    required_for_admin: true
    provider: dod-cap

compute:
  kubernetes:
    distribution: rke2
    version: "1.28.4"
    stig_hardened: true
    cis_benchmark_score: 87
  nodes:
    os: rhel-8
    stig_hardened: true
    last_scan: 2026-05-22
    open_findings_high: 2
    open_findings_medium: 14

logging:
  destinations:
    - cloudwatch
    - s3-archive
  retention_online_days: 180
  retention_archive_days: 1095
  event_types_logged:
    - auth_success
    - auth_failure
    - config_change
    - cui_data_access
    - system_error
  tamper_protection: object_lock_governance
  access_controls:
    readers:
      - role: isso
      - role: soc-analyst
      - role: platform-engineer   # added 2025-08 for debugging

storage:
  database:
    engine: aurora-postgres
    encryption_at_rest: true
    kms_key_rotation: enabled
    backup_cadence: daily
    backup_region: us-gov-east-1
    last_restore_test: 2025-09-14
  object_storage:
    encryption_at_rest: true
    encryption_algorithm: AES256
    versioning: enabled

crypto:
  tls_library: openssl-3.0
  fips_mode: enabled
  modules_in_use:
    - aws-lc-fips-2.0
    - openssl-fips-3.0
  legacy_exceptions:
    - service: legacy-etl
      uses: openssl-1.1.1
      fips_validated: false
      waiver_expires: 2025-12-31   # expired

monitoring:
  siem: splunk-cloud-gov
  edr: crowdstrike-falcon-gov
  ioc_feeds: enabled
  automated_response: partial
  soc_integration: true

config_management:
  iac_tool: terraform
  iac_repo: github.com/aegis-log/infra
  drift_detection:
    enabled: true
    cadence: weekly
    last_run: 2026-05-30
  baseline_doc_ref: ssp.md`